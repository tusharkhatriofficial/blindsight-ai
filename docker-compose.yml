services:

  # ── Python AI agent ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./blindsight-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./blindsight-backend/.env   # OPENAI_API_KEY, STREAM_API_KEY, STREAM_API_SECRET
    environment:
      CALL_TYPE: default
      CALL_ID: blindsight-live
      LOG_LEVEL: INFO
    # No ports — worker connects outbound to Stream's edge; no inbound traffic needed

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./blindsight-frontend
      dockerfile: Dockerfile
      args:
        # Build-time public key baked into the JS bundle
        NEXT_PUBLIC_STREAM_API_KEY: ${NEXT_PUBLIC_STREAM_API_KEY}
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./blindsight-frontend/.env.local   # NEXT_PUBLIC_STREAM_API_KEY, STREAM_API_SECRET
    environment:
      NODE_ENV: production
